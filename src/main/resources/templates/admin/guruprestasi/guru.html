<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Guru</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="admin-body">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="admin-content">
        <div class="topbar">
            <div>
                <h1>Kelola Data Guru</h1>
                <p>Manajemen data tenaga pengajar</p>
            </div>
            <a th:href="@{/guru/tambah}" class="btn-sm btn-add">+ Tambah Guru</a>
        </div>
        <div class="admin-card">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th style="width:40px;">No</th>
                        <th>Nama</th>
                        <th>Mata Pelajaran</th>
                        <th style="width:140px;">Aksi</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="g, s : ${listGuru}">
                        <td th:text="${s.count}">1</td>
                        <td th:text="${g.nama}">Nama Guru</td>
                        <td th:text="${g.mataPelajaran}">Mata Pelajaran</td>
                        <td>
                            <a th:href="@{'/guru/edit/' + ${g.id}}"  class="btn-sm btn-edit">Edit</a>
                            <a th:href="@{'/guru/hapus/' + ${g.id}}" class="btn-sm btn-delete">Hapus</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(listGuru)}">
                        <td colspan="4" style="text-align:center;color:#888;padding:24px;">
                            Belum ada data guru.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
