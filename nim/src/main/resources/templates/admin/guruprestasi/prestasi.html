<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Prestasi — Admin</title>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body class="admin-body">

    <!-- Sidebar -->
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <!-- Content -->
    <div class="admin-content">

        <!-- Topbar -->
        <div class="topbar">
            <div>
                <h1>Kelola Prestasi Sekolah</h1>
                <p>Manajemen data prestasi siswa dan sekolah</p>
            </div>

            <a th:href="@{/prestasi/tambah}" class="btn-sm btn-add">
                + Tambah Prestasi
            </a>
        </div>

        <!-- Card -->
        <div class="admin-card">

            <table class="admin-table">

                <thead>
                    <tr>
                        <th style="width: 40px;">No</th>
                        <th>Judul</th>
                        <th>Deskripsi</th>
                        <th style="width: 140px;">Aksi</th>
                    </tr>
                </thead>

                <tbody>

                    <!-- Data Prestasi -->
                    <tr th:each="p, s : ${listPrestasi}">
                        <td th:text="${s.count}">1</td>

                        <td th:text="${p.judul}">
                            Judul Prestasi
                        </td>

                        <td th:text="${p.deskripsi}">
                            Deskripsi Prestasi
                        </td>

                        <td>
                            <a th:href="@{'/prestasi/edit/' + ${p.id}}"
                               class="btn-sm btn-edit">
                                Edit
                            </a>

                            <a th:href="@{'/prestasi/hapus/' + ${p.id}}"
                               class="btn-sm btn-delete"
                               onclick="return confirm('Yakin ingin menghapus data ini?')">
                                Hapus
                            </a>
                        </td>
                    </tr>

                    <!-- Jika Tidak Ada Data -->
                    <tr th:if="${#lists.isEmpty(listPrestasi)}">
                        <td colspan="4"
                            style="text-align:center; color:#888; padding:24px;">

                            Siswa SMA N 1 Parmaksian telah memenangkan berbagai
                            perlombaan seperti olimpiade, olahraga,
                            dan lomba menulis cerita.

                        </td>
                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</body>

</html>
