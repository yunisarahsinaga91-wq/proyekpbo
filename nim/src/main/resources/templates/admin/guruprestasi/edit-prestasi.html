<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Prestasi — Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="admin-body">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="admin-content">
        <div class="topbar">
            <div>
                <h1 th:text="${prestasi.id == null} ? 'Tambah Prestasi' : 'Edit Prestasi'">Form Prestasi</h1>
                <p>Isi data prestasi sekolah</p>
            </div>
            <a th:href="@{/prestasi}" class="btn-sm btn-edit">← Kembali</a>
        </div>
        <div class="admin-card" style="max-width:680px;">
            <div th:if="${error}"
                 style="background:#fff0f0;color:#c62828;padding:12px 14px;border-radius:8px;
                        font-size:13px;border-left:3px solid #c62828;margin-bottom:16px;"
                 th:text="${error}">Error</div>

            <form th:action="${prestasi.id == null} ? @{/prestasi/simpan} : @{/prestasi/update/{id}(id=${prestasi.id})}"
                  method="post">

                <input type="text" name="judul"
                       th:value="${prestasi.judul}"
                       placeholder="Judul Prestasi" required>

                <textarea name="deskripsi"
                          th:text="${prestasi.deskripsi}"
                          placeholder="Deskripsi Prestasi"></textarea>

                <input type="text" name="tahun"
                       th:value="${prestasi.tahun}"
                       placeholder="Tahun (contoh: 2024)">

                <select name="kategori">
                    <option value="">-- Pilih Kategori --</option>
                    <option value="akademik"
                            th:selected="${prestasi.kategori == 'akademik'}">Akademik</option>
                    <option value="non-akademik"
                            th:selected="${prestasi.kategori == 'non-akademik'}">Non-Akademik</option>
                </select>

                <button type="submit" class="btn-sm btn-add"
                        th:text="${prestasi.id == null} ? '+ Simpan Prestasi' : '✔ Update Prestasi'">Simpan</button>
            </form>
        </div>
    </div>
</body>
</html>
