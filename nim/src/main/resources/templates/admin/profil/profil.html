<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Profil — Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="admin-body">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="admin-content">
        <div class="topbar">
            <div>
                <h1>Kelola Profil Sekolah</h1>
                <p>Manajemen data profil sekolah</p>
            </div>
            <a th:href="@{/profil/tambah}" class="btn-sm btn-add">+ Tambah Profil</a>
        </div>
        <div class="admin-card">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th style="width:40px;">No</th>
                        <th>Nama Sekolah</th>
                        <th>Alamat</th>
                        <th style="width:140px;">Aksi</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p, s : ${listProfil}">
                        <td th:text="${s.count}">1</td>
                        <td th:text="${p.namaSekolah}">Nama Sekolah</td>
                        <td th:text="${p.alamat}">Alamat</td>
                        <td>
                            <a th:href="@{'/profil/edit/' + ${p.id}}"  class="btn-sm btn-edit">Edit</a>
                            <a th:href="@{'/profil/hapus/' + ${p.id}}" class="btn-sm btn-delete">Hapus</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(listProfil)}">
                        <td colspan="4" style="text-align:center; color:#888; padding:24px;">
                            Belum ada data profil.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
