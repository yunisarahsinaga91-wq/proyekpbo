<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelola Pengumuman — Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="admin-body">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="admin-content">
        <div class="topbar">
            <div>
                <h1>Kelola Pengumuman Sekolah</h1>
                <p>Manajemen informasi dan pengumuman</p>
            </div>
            <a th:href="@{/pengumuman/tambah}" class="btn-sm btn-add">+ Tambah Pengumuman</a>
        </div>
        <div class="admin-card">
            <table class="admin-table">
                <thead>
                    <tr>
                        <th style="width:40px;">No</th>
                        <th>Judul</th>
                        <th>Isi</th>
                        <th style="width:140px;">Aksi</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="p, s : ${listPengumuman}">
                        <td th:text="${s.count}">1</td>
                        <td th:text="${p.judul}">Judul</td>
                        <td th:text="${p.isi}">Isi</td>
                        <td>
                            <a th:href="@{'/pengumuman/edit/' + ${p.id}}"  class="btn-sm btn-edit">Edit</a>
                            <a th:href="@{'/pengumuman/hapus/' + ${p.id}}" class="btn-sm btn-delete">Hapus</a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(listPengumuman)}">
                        <td colspan="4" style="text-align:center;color:#888;padding:24px;">
                            Belum ada pengumuman.
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>
</html>
