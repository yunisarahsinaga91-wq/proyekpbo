<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Pengumuman — Admin</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="admin-body">
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>
    <div class="admin-content">
        <div class="topbar">
            <div>
                <h1 th:text="${pengumuman.id == null} ? 'Tambah Pengumuman' : 'Edit Pengumuman'">Form Pengumuman</h1>
                <p>Isi data pengumuman sekolah</p>
            </div>
            <a th:href="@{/pengumuman}" class="btn-sm btn-edit">← Kembali</a>
        </div>
        <div class="admin-card" style="max-width:680px;">
            <div th:if="${error}"
                 style="background:#fff0f0;color:#c62828;padding:12px 14px;border-radius:8px;
                        font-size:13px;border-left:3px solid #c62828;margin-bottom:16px;"
                 th:text="${error}">Error</div>
            <form th:action="${pengumuman.id == null} ? @{/pengumuman/simpan} : @{'/pengumuman/update/' + ${pengumuman.id}}"
                  method="post">
                <input type="text" name="judul"
                       th:value="${pengumuman.judul}"
                       placeholder="Judul Pengumuman" required>
                <textarea name="isi"
                          th:text="${pengumuman.isi}"
                          placeholder="Isi Pengumuman" required></textarea>
                <button type="submit" class="btn-sm btn-add"
                        th:text="${pengumuman.id == null} ? '+ Simpan Pengumuman' : '✔ Update Pengumuman'">Simpan</button>
            </form>
        </div>
    </div>
</body>
</html>
