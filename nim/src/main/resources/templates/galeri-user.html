<!DOCTYPE html>
<html lang="id"
      xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Galeri Sekolah</title>

    <link rel="stylesheet"
          th:href="@{/css/style.css}">

</head>

<body>

    <!-- ================= NAVBAR ================= -->

    <nav class="navbar">

        <div class="logo">
            SMA N 1 PARMAKSIAN
        </div>

        <div class="menu">

            <a th:href="@{/}">
                Home
            </a>

            <a th:href="@{/profil}">
                Profil
            </a>

            <a th:href="@{/informasi}">
                Informasi
            </a>

            <a th:href="@{/galeri}">
                Galeri
            </a>

            <a th:href="@{/login}">
                Login
            </a>

        </div>

    </nav>

    <!-- ================= PAGE HEADER ================= -->

    <section class="page-header">

        <h1>
            Galeri Sekolah
        </h1>

        <p>
            Dokumentasi kegiatan dan prestasi
            SMA N 1 PARMAKSIAN
        </p>

    </section>

    <!-- ================= GALERI ================= -->

    <section class="section">

        <h2>
            📸 Galeri Foto
        </h2>

        <div class="cards">

            <div class="card"
                 th:each="g : ${listGaleri}">

                <img th:src="${g.gambar}"
                     alt="Galeri Sekolah">

                <h3 th:text="${g.judul}">
                    Judul Galeri
                </h3>

            </div>

        </div>

    </section>

    <!-- ================= FOOTER ================= -->

    <footer>

        © 2026 SMA N 1 PARMAKSIAN
        <br>
        Website Resmi Sekolah

    </footer>

</body>

</html>
