<!DOCTYPE html>
<html lang="id" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Guru — SMA Negeri 1 Parmaksian</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <section class="page-header">
        <div class="page-header-inner">
            <p class="page-tag">Tenaga Pendidik</p>
            <h1>Data Guru</h1>
        </div>
    </section>

    <section class="page-section">
        <div class="guru-grid" th:if="${!#lists.isEmpty(listGuru)}">
            <div class="guru-card" th:each="g : ${listGuru}">
                <div class="guru-avatar">
                    <img th:if="${g.foto != null and !#strings.isEmpty(g.foto)}"
                         th:src="${g.foto}" th:alt="${g.nama}">
                    <div class="guru-avatar-placeholder"
                         th:if="${g.foto == null or #strings.isEmpty(g.foto)}"
                         th:text="${#strings.substring(g.nama, 0, 1)}">A</div>
                </div>
                <div class="guru-info">
                    <h3 th:text="${g.nama}">Nama Guru</h3>
                    <p th:text="${g.mataPelajaran}">Mata Pelajaran</p>
                </div>
            </div>
        </div>
        <div class="empty-state" th:if="${#lists.isEmpty(listGuru)}">
            Belum ada data guru.
        </div>
    </section>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
    <script th:src="@{/js/navbar.js}"></script>
</body>
</html>
