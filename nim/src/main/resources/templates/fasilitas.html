<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fasilitas SMA Negeri 1 Parmaksian</title>

    <style>

        body{
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin:0;
            padding:0;
        }

        h1{
            text-align:center;
            background:#0d6efd;
            color:white;
            padding:20px;
            margin:0;
        }

        .container{
            display:flex;
            justify-content:center;
            flex-wrap:wrap;
            gap:20px;
            padding:30px;
        }

        .card{
            background:white;
            width:250px;
            border-radius:10px;
            box-shadow:0 4px 8px rgba(0,0,0,0.2);
            overflow:hidden;
        }

        .card img{
            width:100%;
            height:180px;
            object-fit:cover;
        }

        .card-content{
            padding:15px;
        }

        .card h3{
            margin-top:0;
            color:#0d6efd;
        }

    </style>
</head>

<body>

<h1>Fasilitas SMA Negeri 1 Parmaksian</h1>

<div class="container">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1521587760476-6c12a4b040da">
        <div class="card-content">
            <h3>Perpustakaan</h3>
            <p>Tempat membaca dan meminjam buku untuk siswa.</p>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1516321318423-f06f85e504b3">
        <div class="card-content">
            <h3>Laboratorium</h3>
            <p>Fasilitas praktikum dan penelitian siswa.</p>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1508609349937-5ec4ae374ebf">
        <div class="card-content">
            <h3>Lapangan</h3>
            <p>Tempat olahraga dan kegiatan upacara sekolah.</p>
        </div>
    </div>

</div>

</body>
</html>
