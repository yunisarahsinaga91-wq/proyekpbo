<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Register</title>

</head>

<body>

    <h2>Register User</h2>

    <form action="/register"
          method="post">

        <input type="text"
               name="username"
               placeholder="Username">

        <br><br>

        <input type="password"
               name="password"
               placeholder="Password">

        <br><br>

        <button type="submit">
            Register
        </button>

    </form>

    <br>

    <a href="/login">
        Kembali ke Login
    </a>

</body>

</html>
